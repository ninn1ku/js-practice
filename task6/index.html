<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Чистые функции</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

  <div class="controls">

    <div class="control-block">
      <h3>filterByCategory</h3>
      <select id="categoryInput">
        <option value="Периферия">Периферия</option>
        <option value="Техника">Техника</option>
        <option value="Аксессуары">Аксессуары</option>
      </select>
      <button id="categoryBtn">Фильтровать</button>
      <ul id="categoryResult"></ul>
    </div>

    <div class="control-block">
      <h3>searchProducts</h3>
      <input type="text" id="searchInput" placeholder="Введите запрос">
      <button id="searchBtn">Найти</button>
      <ul id="searchResult"></ul>
    </div>

    <div class="control-block">
      <h3>sortByPrice</h3>
      <select id="sortInput">
        <option value="asc">По возрастанию</option>
        <option value="desc">По убыванию</option>
      </select>
      <button id="sortBtn">Сортировать</button>
      <ul id="sortResult"></ul>
    </div>

    <div class="control-block">
      <h3>formatProducts</h3>
      <button id="formatBtn">Форматировать</button>
      <ul id="formatResult"></ul>
    </div>

  </div>

</body>
</html>
